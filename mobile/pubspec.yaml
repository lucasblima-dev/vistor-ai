name: vistor_ai_mobile
description: "Vistor AI Mobile App for Inspectors and Managers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^8.1.5
  go_router: ^13.0.0
  dio: ^5.4.0
  drift: ^2.16.0
  flutter_map: ^6.1.0
  flutter_map_marker_cluster: ^1.3.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0
  firebase_messaging: ^14.7.0
  flutter_secure_storage: ^9.0.0
  freezed_annotation: ^2.4.1
  hive_flutter: ^1.1.0
  connectivity_plus: ^5.0.0
  open_filex: ^4.3.4
  signature: ^5.4.0
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  animate_do: ^3.3.4
  flutter_staggered_animations: ^1.1.1
  animations: ^2.0.11
  dotted_border: ^2.1.0
  get_it: ^7.6.7
  envied: ^0.5.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.8.0
  drift_dev: ^2.16.0
  envied_generator: ^0.5.4
  mocktail: ^1.0.4
  bloc_test: ^9.1.7

dependency_overrides:
  test_api: ^0.7.10
  matcher: ^0.12.19
  test_core: ^0.6.0
  test: ^1.25.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
